<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPM Video Hub | Fokus & Belajar</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <nav>
            <div class="logo">SPM<span>HUB</span></div>
            <ul>
                <li><a href="#">Utama</a></li>
                <li><a href="#subjek">Subjek</a></li>
                <li><a href="#">Nota</a></li>
            </ul>
        </nav>
        <div class="hero">
            <h1>Jom Belajar.</h1>
            <p>Koleksi video tutorial terbaik untuk persediaan SPM anda.</p>
        </div>
    </header>

  <section id="subjek" class="container">
    <h2 class="section-title">Pilih Subjek Anda</h2>
    <div class="subject-grid">
        
        <div class="card" onclick="openVideo('https://www.youtube.com/embed/videoseries?list=PLaYhTt8rcw4rLM7sqJkCTzccSLl2q2Hqy', 'Koleksi Video Biologi')">
            <div class="card-icon">🧬</div>
            <h3>BIOLOGI</h3>
            <p>Video Pembelajaran</p>
            <button>Tonton</button>
        </div>

        <div class="card" onclick="openVideo('https://www.youtube.com/embed/videoseries?list=PLaYhTt8rcw4oikjgVqhYLl4VFOI4h8Bo3', 'Koleksi Video Kimia')">
            <div class="card-icon">🧪</div>
            <h3>KIMIA</h3>
            <p>Video Pembelajaran</p>
            <button>Tonton</button>
        </div>

        <div class="card" onclick="openVideo('https://www.youtube.com/embed/videoseries?list=ID_PLAYLIST_FIZIK_ANDA', 'Koleksi Video Fizik')">
            <div class="card-icon">⚛️</div>
            <h3>FIZIK</h3>
            <p>Video Pembelajaran</p>
            <button>Tonton</button>
        </div>

    </div>
</section>

    <div id="videoModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeVideo()">&times;</span>
            <h2 id="videoTitle">Tajuk Video</h2>
            <div class="video-container">
                <iframe id="mainVideo" src="" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Dibangunkan oleh AN - Pendidikan Digital Perlis</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
